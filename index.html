<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ricky & Puput Wedding</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
    --white:#f5f1ed;
    --soft:#d9d1ca;
    --dark:#0f0f0f;
    --overlay:rgba(0,0,0,.58);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Montserrat',sans-serif;
    overflow:hidden;
    background:black;
}

/* HERO */

.hero{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:black;
}

/* VIDEO */

.video-bg{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.video-bg iframe{
    position:absolute;
    top:50%;
    left:50%;
    width:100vw;
    height:177.77vw;
    min-height:100vh;
    min-width:56.25vh;
    transform:translate(-50%, -50%);
    pointer-events:none;
    filter:
    brightness(.45)
    contrast(1.05)
    saturate(.9);
}

/* DARK OVERLAY */

.overlay{
    position:absolute;
    inset:0;
    background:
    linear-gradient(
        rgba(0,0,0,.45),
        rgba(0,0,0,.72)
    );
    z-index:1;
}

/* CONTENT */

.hero-content{
    position:relative;
    z-index:2;
    padding:20px;
    max-width:900px;
    animation:fadeUp 1.8s ease;
}

/* SMALL TEXT */

.hero-content p{
    color:rgba(255,255,255,.72);
    letter-spacing:5px;
    font-size:12px;
    font-weight:400;
    margin-bottom:18px;
    text-transform:uppercase;
}

/* MAIN TITLE */

.hero-content h1{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(68px,11vw,150px);
    font-weight:500;
    color:rgba(255,255,255,.92);
    line-height:1;
    margin-bottom:20px;
    letter-spacing:1px;
    text-shadow:
    0 10px 40px rgba(0,0,0,.4);
}

/* DATE */

.date{
    color:rgba(255,255,255,.65);
    font-size:13px;
    letter-spacing:6px;
    margin-top:10px;
}

/* LINE */

.hero-line{
    width:110px;
    height:1px;
    background:rgba(255,255,255,.28);
    margin:28px auto;
}

/* SUBTEXT */

.hero-text{
    color:rgba(255,255,255,.60);
    font-size:13px;
    letter-spacing:3px;
    font-weight:300;
}

/* MUSIC BUTTON */

.music-btn{
    position:fixed;
    right:25px;
    bottom:25px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.08);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
    cursor:pointer;
    z-index:999;
    transition:.35s ease;
}

.music-btn:hover{
    transform:scale(1.08);
    background:rgba(255,255,255,.14);
}

/* ANIMATION */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(45px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* MOBILE */

@media(max-width:768px){

.hero-content h1{
    font-size:64px;
}

.hero-content p{
    font-size:11px;
    letter-spacing:4px;
}

.hero-text{
    font-size:11px;
    letter-spacing:2px;
}

.date{
    font-size:11px;
    letter-spacing:4px;
}

.video-bg iframe{
    height:190vw;
}

}

@media(max-width:480px){

.hero-content h1{
    font-size:52px;
}

.video-bg iframe{
    height:210vw;
}

.music-btn{
    width:52px;
    height:52px;
    font-size:18px;
}

}

</style>

</head>
<body>

<!-- HERO -->

<section class="hero">

<!-- VIDEO BACKGROUND -->

<div class="video-bg">

<iframe
src="https://www.youtube.com/embed/tmiynJuZt3w?autoplay=1&mute=1&controls=0&loop=1&playlist=tmiynJuZt3w&playsinline=1&rel=0"
title="Wedding Video"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

</div>

<!-- OVERLAY -->

<div class="overlay"></div>

<!-- CONTENT -->

<div class="hero-content">

<p>THE WEDDING OF</p>

<h1>Ricky & Puput</h1>

<div class="date">
11 OCTOBER 2026
</div>

<div class="hero-line"></div>

<div class="hero-text">
Together With Their Families
</div>

</div>

</section>

<!-- MUSIC BUTTON -->

<div class="music-btn" onclick="toggleMusic()">
♫
</div>

<!-- MUSIC -->

<audio id="bgMusic" loop>

<source src="music/music.mp3" type="audio/mp3">

</audio>

<script>

/* MUSIC */

const music = document.getElementById('bgMusic');

let isPlaying = false;

function toggleMusic(){

    if(isPlaying){

        music.pause();
        isPlaying = false;

    }else{

        music.play();
        isPlaying = true;

    }

}

</script>

</body>
</html>
